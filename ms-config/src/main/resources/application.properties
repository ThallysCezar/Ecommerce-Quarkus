# Porta para rodar o ms-config:
quarkus.http.port=8085

my.custom.config=Este é um valor de configuraçăo de exemplo
quarkus.config-server.enabled=true

# Esse caminho, acima, deve apontar para um diretório onde vocę irá armazenar os arquivos de configuraçăo em formatos como YAML ou JSON, no meu caso foi dentro do próprio repositório do ms-config.
quarkus.config-server.config-locations=C:\\Workspace\\Person-Projects\\project-ecommerce\\ms-config\\src\\main\\java\\dev\\thallys\\ms\\config\\configs

# Configuraçőes do banco de dados
db.kind=postgresql
db.url=jdbc:postgresql://localhost:5432/ecomproject
db.username=postgres
db.password=123456
db.driver=org.postgresql.Driver
db.min-size=5
db.max-size=20
db.acquire-timeout=30
db.validation-timeout=30

# Hibernate
hibernate.log.format-sql=true
hibernate.log.sql=true
hibernate.sql-load-script=import.sql
hibernate.database.generation=update

# Hibernate ms-carrinho
hibernate.sql-load-script.ms-carrinho=import-msCarrinho.sql
hibernate.database.generation.ms-carrinho=update

# Hibernate ms-checkout
hibernate.sql-load-script.ms-checkout=import-msCheckout.sql
hibernate.database.generation.ms-checkout=update

# Hibernate ms-produtos
hibernate.sql-load-script.ms-produtos=import-msProdutos.sql
hibernate.database.generation.ms-produtos=update

